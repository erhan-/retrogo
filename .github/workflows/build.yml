name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-retroarch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build RetroArch
        run: docker build -t retrogo-builder -f Dockerfile.retroarch .
      - name: Extract binary
        run: docker run --rm -v "$(pwd):/output" retrogo-builder cp /retroarch /output/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-armhf
          path: retroarch

  build-midigamepad:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build toolchain
        run: docker build -t primego-toolchain .
      - name: Build MIDI bridge
        run: |
          docker run --rm -v "$(pwd):/work" primego-toolchain sh -c '
            arm-linux-gnueabihf-gcc -O2 -static -o /work/midigamepad /work/midigamepad.c -lpthread && \
            arm-linux-gnueabihf-strip /work/midigamepad
          '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midigamepad-armhf
          path: midigamepad

  release:
    needs: [build-retroarch, build-midigamepad]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            retroarch-armhf/retroarch
            midigamepad-armhf/midigamepad
          generate_release_notes: true
